出现编辑页面</strong></p><p><strong>键入</strong> <strong><code>LABEL=分区名 none ntfs rw,auto,nobrowse</code></strong> <strong>想挂几个就写几条</strong></p><p><strong>4、ctrl+x 出现提示问你yes还是no,点Y确认,再回车</strong></p><p><strong>接下来使用mac自带的磁盘工具,在启动台里找,点卸载,然后点装载,使配置生效</strong></p><!-- .slide vertical=true --><p><strong>5、接下来在这个访达里shift+win+G,在弹出的前往文件夹中输入/Volumes回车,这时候你就能看到你能这几个磁盘分区了，在这几个磁盘分区的页面输入shift+win+T把Volumes固定到侧栏,以后用到分区直接点它就好。</strong></p><p><strong>6、这时候已经成功的可以操作NTFS格式的磁盘了,到这里就结束了,U盘/移动硬盘也是同样的道理,给U盘移动硬盘命名然后添加进配置文件,在Volumes就能看到。</strong></p><!-- .slide --><h2 id="轻松实现上述功能">轻松实现上述功能</h2><ul><li>加油 💪！</ul></textarea></section></div><script async="async" src="https://cdn.jsdelivr.net/combine/npm/reveal.js@4.2.0/dist/reveal.min.js,npm/reveal.js@4.2.0/plugin/markdown/markdown.min.js,npm/reveal.js@4.2.0/plugin/math/math.min.js,npm/reveal.js@4.2.0/plugin/highlight/highlight.min.js" onload=" for(let x of document.getElementsByClassName('wrap')) x.classList.add('reveal'); Reveal.initialize({ height: '100%', mouseWheel: true, navigationMode: 'linear', plugins: [ RevealMarkdown,RevealMath,RevealHighlight ] }); "></script></div><label for="sidebar-checkbox" class="sidebar-toggle"></label>
