s@4.2.0/dist/theme/serif.min.css" /><style> .sidebar { line-height: 1.5; } .reveal .slides { text-align: left; } .reveal a { color: #268BD2; }</style><div class="slides"><section data-markdown data-separator='&lt;!-- .slide --&gt;' data-separator-vertical='&lt;!-- .slide vertical=true --&gt;' data-background-color='White' > <textarea data-template><style> .reveal .slides { text-align: left; }</style><p><strong>计算机组成原理实验：RISC-V CPU</strong></p><ul><li>TA：吴坎<li><a href="mailto:wukan3@mail2.sysu.edu.cn">wukan3[at]mail2.sysu.edu.cn</a></ul><!-- .slide --><h2 id="国内计组实验现状">国内计组实验现状</h2><!-- .slide vertical=true --><ul><li>清华：奋战三星期，造台计算机<li>国科大：一生一芯<li>中大：30 多年前的 MIPS CPU</ul><!-- .slide --><h2 id="国产-cpu百花齐放">国产 CPU：百花齐放</h2><!-- .slide vertical=true --><ul><li>ARM：飞腾、华为海思、展讯、华芯通<li>x86：北大众志、兆芯、海光<li>MIPS：龙芯、君正<li>Alpha：申威众核<li>Power：中晟宏芯</ul><!-- .slide --><h2 id="why-risc-v">Why RISC-V</h2><!-- .slide vertical=true --><table><thead><tr><th style="text-align: center">特性<th style="text-align: center">x86 or ARM<th style="text-align: center">RISC-V<tbody><tr><td style="text-align: center">架构篇幅<td style="text-align: center">数千页<td style="text-align: center">少于三百页<tr><td style="text-align: center">模块化<td style="text-align: center">不支持<td style="text-align: center">支持模块化可扩展的指令子集<tr><td style="text-align: center">可扩展性<td style="text-align: center">不支持<td style="text-align: center">支持可扩展定制指令<tr><td style="text-align: center">指令数目<td style="text-align: center">繁多，不同架构分支彼此不兼容<td style="text-align: center">基本指令集仅 40+ 条<tr><td style="text-align: center">易实现性<td style="text-align: center">复杂度高<td style="text-align: center">硬件设计与编译器实现非常简单</table><!-- .slide vertical=true --><ul><li>Less is more，把更多工作交给编译器！<ul><li>仅支持小端模式<li>规整的指令编码<li>存储访问指令一次只访问一个元素<li>去除存储器访问指令的地址自增自减模式<li>简化的分支跳转指令与静态预测机制</ul></ul><!-- .slide vertical=true --><ul><li>Less is more，把更多工作交给编译器！<ul><li>不使用分支延迟槽<li>不使用指令条件码<li>运算指令不产生异常<li>不使用零开销硬件循环<li>……</ul></ul><!-- .slide --><h2 id="你能获得">你能获得</h2><!-- .slide vertical=true --><ul><li>有情怀、有含金量的项目经历<ul><li>可自豪地写在简历上</ul><li>与操作系统实验课的梦幻联动<ul><li>“逸仙 OS” RISC-V 移植化锐意进行中！<li>在自己的 CPU 上运行自己的操作系统！</ul><li>成果优秀的同学可推荐进入中大超算队<ul><li>参与下一年实验课改革！<li>组队参加<a href="http://cqc.yeeol.com/cybs_home.html?id=9">逐梦杯</a>等比赛！</ul></ul><!-- .slide --><h2 id="实验要求与时间节点">实验要求与时间节点</h2><!-- .slide vertical=true --><ul><li>必做：单周期 CPU（60 分），二周~三周<ul><li>实现 RV32I Base Integer Instructions<li>除 ebreak 之外的指令集，共 38 条<ul><li>ecall 作为停机指令</ul><li>见 <a href="https://github.com/jameslzhu/riscv-card/blob/rel/1.0/riscv-card.pdf">RISC-V card</a></ul></ul><!-- .slide vertical=true --><ul><li>必做：多（五）周期 CPU（30 分），一周~二周<ul><li>在单周期 CPU 的基础上修改<li>在 CU 中增加状态机<li>各个部件用时钟同步</ul></ul><!-- .slide vertical=true --><ul><li>选做：Do what you want to do（10 分，视完成情况）<ul><li>指令集扩展<ul><li>RV32M 指令集（整数乘除法）<li>RV32C 指令集（压缩指令长度）<li>RV64I 指令集（扩展寻址空间）<li>……</ul></ul></ul><!-- .slide vertical=true --><ul><li>选做：Do what you want to do（10 分，视完成情况）<ul><li>架构优化<ul><li>流水线<li>乱序多发射<li>……</ul></ul></ul><!-- .slide --><h2 id="实验指南">实验指南</h2><!-- .slide vertical=true --><p><img src="https://i.loli.net/2021/11/16/VcsQERBCn9uN68Y.png" alt="单周期CPU数据通路和控制线路图" /></p><!-- .slide vertical=true --><ul><li>实验具体流程<ol><li>根据线路图实现 CPU 的每个模块，如 CU、ALU<li>将每个模块组合<li>将提供的指令转为二进制码并仿真测试<li>烧板</ol></ul><!-- .slide vertical=true --><table><thead><tr><th style="text-align: center">地址（十六进制）<th style="text-align: center">汇编程序<th style="text-align: center">汇编指令（二进制）<tbody><tr><td style="text-align: center">0x00000000<td style="text-align: center">addi x1,x0,8<td style="text-align: center"> <tr><td style="text-align: center">0x00000004<td style="text-align: center">ori x2,x0,2<td style="text-align: center"> <tr><td style="text-align: center">0x00000008<td style="text-align: center">add x3,x2,x1<td style="text-align: center"> <tr><td style="text-align: center">0x0000000C<td style="text-align: center">sub x5,x3,x2<td style="text-align: center"> </table><!-- .slide vertical=true --><table><thead><tr><th style="text-align: center">地址（十六进制）<th style="text-align: center">汇编程序<th style="text-align: center">汇编指令（二进制）<tbody><tr><td style="text-align: center">0x00000010<td style="text-align: center">and x4,x5,x2<td style="text-align: center"> <tr><td style="text-align: center">0x00000014<td style="text-align: center">or x8,x4,x2<td style="text-align: center"> <tr><td style="text-align: center">0x00000018<td style="text-align: center">slli x8,x8,1<td style="text-align: center"> <tr><td style="text-align: center">0x0000001C<td style="text-align: center">bne x8,x1,-4<td style="text-align: center"> </table><!-- .slide vertical=true --><table><thead><tr><th style="text-align: center">地址（十六进制）<th style="text-align: center">汇编程序<th style="text-align: center">汇编指令（二进制）<tbody><tr><td style="text-align: center">0x00000020<td style="text-align: center">slti x6,x2,4<td style="text-align: center"> <tr><td style="text-align: center">0x00000024<td style="text-align: center">slti x7,x6,0<td style="text-align: center"> <tr><td style="text-align: center">0x00000028<td style="text-align: center">addi x7,x7,8<td style="text-align: center"> <tr><td style="text-align: center">0x0000002C<td style="text-align: center">beq x7,x1,-4<td style="text-align: center"> </table><!-- .slide vertical=true --><table><thead><tr><th style="text-align: center">地址（十六进制）<th style="text-align: center">汇编程序<th style="text-align: center">汇编指令（二进制）<tbody><tr><td style="text-align: center">0x00000030<td style="text-align: center">sw x2,4(x1)<td style="text-align: center"> <tr><td style="text-align: center">0x00000034<td style="text-align: center">lw x9,4(x1)<td style="text-align: center"> <tr><td style="text-align: center">0x00000038<td style="text-align: center">addi x10,x0,-2<td style="text-align: center"> <tr><td style="text-align: center">0x0000003C<td style="text-align: center">addi x10,x10,1<td style="text-align: center"> </table><!-- .slide vertical=true --><table><thead><tr><th style="text-align: center">地址（十六进制）<th style="text-align: center">汇编程序<th style="text-align: center">汇编指令（二进制）<tbody><tr><td style="text-align: center">0x00000040<td style="text-align: center">blt x10,x0,-2<td style="text-align: center"> <tr><td style="text-align: center">0x00000044<td style="text-align: center">andi x11,x2,2<td style="text-align: center"> <tr><td style="text-align: center">0x00000048<td style="text-align: center">jal x8,8<td style="text-align: center"> <tr><td style="text-align: center">0x0000004C<td style="text-align: center">or x8,x4,x2<td style="text-align: center"> <tr><td style="text-align: center">0x00000050<td style="text-align: center">ecall<td style="text-align: center"> </table><!-- .slide vertical=true --><ul><li>大部分实现与细节都可参照往年 MIPS CPU<ul><li>仅调整指令集，需修改指令译码部分<li>注意实现细节，如<ul><li>PC 的改变是在时钟上升沿进行的<li>指令执行的结果总是在时钟下降沿保存到寄存器和存储器中<li>这样稳定性较好</ul></ul></ul><!-- .slide --><h2 id="实验原则">实验原则</h2><!-- .slide vertical=true --><ul><li>原则：必须原创<ul><li>第一届冯班，并不要求过高完成度<li>往届挂科率 20%+，难以一步吃成胖子<ul><li>如果难以完成 RISC-V，可完成往年 MIPS 实验</ul><li><strong>遇到困难及时在群内反馈！</strong><li>不得抄袭开源设计<li>不要放卫星</ul></ul><!-- .slide vertical=true --><ul><li>原则：反对无意义内卷<ul><li>实验报告请控制在一万字以内，超过扣分<li>对每条指令需要有指令执行的波形（截图）<li>需要对关键信号以文字说明</ul></ul><!-- .slide vertical=true --><ul><li>原则：鼓励创新<ul><li>十分附加分，奖励给探索精神<li>有难有易的扩展方向可选</ul></ul><!-- .slide --><h2 id="参考链接">参考链接</h2><!-- .slide vertical=true --><ul><li><a href="https://riscv.org/specifications/">Specifications - RISC-V International</a><ul><li>RISC-V 架构文档</ul><li><a href="https://github.com/SI-RISCV/e200_opensource">手把手教你设计 CPU——RISC-V 处理器篇</a><ul><li>经典入门书籍</ul><li><a href="https://github.com/jameslzhu/riscv-card/blob/rel/1.0/riscv-card.pdf">RISC-V card</a><ul><li>一张纸就能写下的 RISC-V 指令表</ul></ul><!-- .slide --><h2 id="万丈高楼平地起">万丈高楼平地起</h2><ul><li>加油 💪！</ul></textarea></section></div><script async="async" src="https://cdn.jsdelivr.net/combine/npm/reveal.js@4.2.0/dist/reveal.min.js,npm/reveal.js@4.2.0/plugin/markdown/markdown.min.js,npm/reveal.js@4.2.0/plugin/math/math.min.js,npm/reveal
